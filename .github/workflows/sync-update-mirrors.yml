name: Sync Update Folder To Mirrors

on:
  workflow_dispatch:
    inputs:
      use_latest_release_asset:
        description: "Generate isReady=true manifests from the release matching update/manifest.json versionCode."
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

env:
  MIRROR_OWNER: LittleSurvival
  MIRROR_REPO: ymb-apk-release
  GITEA_BASE_URL: ${{ vars.GITEA_BASE_URL }}
  GITEA_SSH_HOST: ${{ vars.GITEA_SSH_HOST }}
  GITEA_SSH_PORT: ${{ vars.GITEA_SSH_PORT }}

jobs:
  sync-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Sync and validate stable manifest
        run: ./gradlew syncStableManifest validateUpdateManifest --console=plain

      - name: Commit generated stable manifest to GitHub
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update
          git commit -m "Sync update manifest" || exit 0
          git push

      - name: Prepare not-ready public feeds
        if: ${{ !inputs.use_latest_release_asset }}
        shell: bash
        run: |
          set -euo pipefail
          for target in github gitee gitea; do
            dir="$RUNNER_TEMP/published-update/$target/update"
            rm -rf "$dir"
            mkdir -p "$dir"
            cp update/manifest.json "$dir/manifest.json"
            cp update/stable.json "$dir/stable.json"
          done

      - name: Download GitHub release APK
        if: ${{ inputs.use_latest_release_asset }}
        id: latest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("update/manifest.json").read_text(encoding="utf-8"))
          version_code = str(manifest["versionCode"])
          version_name = str(manifest["versionName"])
          channel = str(manifest.get("channel", "stable"))
          apk_name = f"yamibo-{channel}-v{version_name}.apk"

          with open(Path(os.environ["RUNNER_TEMP"]) / "sync_meta.env", "w", encoding="utf-8") as env:
              env.write(f"SYNC_VERSION_CODE={version_code}\n")
              env.write(f"SYNC_VERSION_NAME={version_name}\n")
              env.write(f"SYNC_CHANNEL={channel}\n")
              env.write(f"SYNC_APK_NAME={apk_name}\n")
          PY

          source "$RUNNER_TEMP/sync_meta.env"
          mkdir -p "$RUNNER_TEMP/latest-release"
          gh release view "$SYNC_VERSION_CODE" >/dev/null
          gh release download "$SYNC_VERSION_CODE" \
            -p "$SYNC_APK_NAME" \
            -D "$RUNNER_TEMP/latest-release" \
            --clobber

          apk="$RUNNER_TEMP/latest-release/$SYNC_APK_NAME"
          sha256="$(sha256sum "$apk" | awk '{print $1}')"
          size="$(stat -c%s "$apk")"
          github_release_url="https://github.com/${{ github.repository }}/releases/tag/$SYNC_VERSION_CODE"
          github_asset_url="https://github.com/${{ github.repository }}/releases/download/$SYNC_VERSION_CODE/$SYNC_APK_NAME"

          echo "version_code=$SYNC_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$SYNC_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "channel=$SYNC_CHANNEL" >> "$GITHUB_OUTPUT"
          echo "apk_name=$SYNC_APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "github_release_url=$github_release_url" >> "$GITHUB_OUTPUT"
          echo "github_asset_url=$github_asset_url" >> "$GITHUB_OUTPUT"

      - name: Publish Gitee release asset
        if: ${{ inputs.use_latest_release_asset }}
        id: gitee_release
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ steps.latest.outputs.version_code }}
          TITLE: ${{ steps.latest.outputs.channel }}-v${{ steps.latest.outputs.version_name }}
          CHANGELOG: update/changelogs/${{ steps.latest.outputs.version_code }}.changelog
          APK: ${{ steps.latest.outputs.apk_path }}
          APK_NAME: ${{ steps.latest.outputs.apk_name }}
        run: |
          set -euo pipefail
          bash .github/scripts/publish-gitee-release-asset.sh

      - name: Publish Gitea release asset
        if: ${{ inputs.use_latest_release_asset }}
        id: gitea_release
        shell: bash
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_BASE_URL: ${{ env.GITEA_BASE_URL }}
          TAG: ${{ steps.latest.outputs.version_code }}
          TITLE: ${{ steps.latest.outputs.channel }}-v${{ steps.latest.outputs.version_name }}
          CHANGELOG: update/changelogs/${{ steps.latest.outputs.version_code }}.changelog
          APK: ${{ steps.latest.outputs.apk_path }}
          APK_NAME: ${{ steps.latest.outputs.apk_name }}
        run: |
          set -euo pipefail
          bash .github/scripts/publish-gitea-release-asset.sh

      - name: Generate ready public feeds
        if: ${{ inputs.use_latest_release_asset }}
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_DIR="$RUNNER_TEMP/published-update/github/update" \
          RELEASE_URL="${{ steps.latest.outputs.github_release_url }}" \
          ASSET_URL="${{ steps.latest.outputs.github_asset_url }}" \
          APK_SHA256="${{ steps.latest.outputs.sha256 }}" \
          APK_SIZE="${{ steps.latest.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

          OUTPUT_DIR="$RUNNER_TEMP/published-update/gitee/update" \
          RELEASE_URL="${{ steps.gitee_release.outputs.release_url }}" \
          ASSET_URL="${{ steps.gitee_release.outputs.asset_url }}" \
          APK_SHA256="${{ steps.latest.outputs.sha256 }}" \
          APK_SIZE="${{ steps.latest.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

          OUTPUT_DIR="$RUNNER_TEMP/published-update/gitea/update" \
          RELEASE_URL="${{ steps.gitea_release.outputs.release_url }}" \
          ASSET_URL="${{ steps.gitea_release.outputs.asset_url }}" \
          APK_SHA256="${{ steps.latest.outputs.sha256 }}" \
          APK_SIZE="${{ steps.latest.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

      - name: Validate ready public update folders
        if: ${{ inputs.use_latest_release_asset }}
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/github/update" --console=plain
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/gitee/update" --console=plain
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/gitea/update" --console=plain

      - name: Push update folder to GitHub update-release branch
        shell: bash
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/github-update-release"
          rm -rf "$dir"
          mkdir -p "$dir"
          cp -R "$RUNNER_TEMP/published-update/github/update" "$dir/update"

          git -C "$dir" init
          git -C "$dir" config user.name "github-actions[bot]"
          git -C "$dir" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$dir" remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git -C "$dir" add update
          git -C "$dir" commit -m "Sync update folder"
          git -C "$dir" branch -M update-release
          git -C "$dir" push --force origin update-release

      - name: Start SSH agent for mirrors
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
            ${{ secrets.GITEA_SSH_PRIVATE_KEY }}

      - name: Trust mirror SSH hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          gitea_host="${GITEA_SSH_HOST:-gitea.com}"
          gitea_port="${GITEA_SSH_PORT:-22}"
          ssh-keyscan -p "$gitea_port" "$gitea_host" >> ~/.ssh/known_hosts

      - name: Push update folder to mirror repositories
        shell: bash
        run: |
          set -euo pipefail

          gitea_remote() {
            local host="${GITEA_SSH_HOST:-gitea.com}"
            local port="${GITEA_SSH_PORT:-22}"
            if [ "$port" = "22" ]; then
              printf 'git@%s:%s/%s.git' "$host" "$MIRROR_OWNER" "$MIRROR_REPO"
            else
              printf 'ssh://git@%s:%s/%s/%s.git' "$host" "$port" "$MIRROR_OWNER" "$MIRROR_REPO"
            fi
          }

          push_mirror() {
            local name="$1"
            local remote="$2"
            local dir="$RUNNER_TEMP/mirror-$name"

            rm -rf "$dir"
            mkdir -p "$dir"
            cp -R "$RUNNER_TEMP/published-update/$name/update" "$dir/update"

            git -C "$dir" init
            git -C "$dir" config user.name "github-actions[bot]"
            git -C "$dir" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$dir" remote add origin "$remote"
            git -C "$dir" add update
            git -C "$dir" commit -m "Sync update folder"
            git -C "$dir" branch -M main
            git -C "$dir" push --force origin main
          }

          push_mirror "gitee" "git@gitee.com:${MIRROR_OWNER}/${MIRROR_REPO}.git"
          push_mirror "gitea" "$(gitea_remote)"
