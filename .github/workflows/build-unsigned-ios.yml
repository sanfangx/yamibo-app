name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish IPA directly to GitHub Releases (tag: ios-unsigned-latest)'
        required: false
        type: boolean
        default: false
      run_tmate:
        description: 'Run tmate session for debugging (always)'
        required: false
        type: boolean
        default: false

jobs:
  build-ios:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true
          xcodebuild -version

      - name: Build Kotlin framework for iOS
        run: |
          set -o pipefail
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --console=plain --no-daemon -Pkotlin.native.jvmArgs='-Xmx6144M' 2>&1 | tee gradle.log || {
            echo ""
            echo "=========================================================="
            echo "         GRADLE BUILD FAILED! EXACT ERRORS BELOW:"
            echo "=========================================================="
            grep -E -C 3 "FAILURE:|error:|Exception|e: |IrLinkageError" gradle.log || tail -n 50 gradle.log
            exit 1
          }

      - name: Create shared xcscheme for CI
        run: |
          mkdir -p iosApp/iosApp.xcodeproj/xcshareddata/xcschemes
          cat > iosApp/iosApp.xcodeproj/xcshareddata/xcschemes/iosApp.xcscheme << 'XCS'
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1620"
             version = "1.3">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                         BuildableName = "yamibo_app.app"
                         BlueprintName = "iosApp"
                         ReferencedContainer = "container:iosApp.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES">
                <Testables>
                </Testables>
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                      BuildableName = "yamibo_app.app"
                      BlueprintName = "iosApp"
                      ReferencedContainer = "container:iosApp.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                      BuildableName = "yamibo_app.app"
                      BlueprintName = "iosApp"
                      ReferencedContainer = "container:iosApp.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          XCS

      - name: Build Unsigned iOS App Bundle
        env:
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED: "YES"
        run: |
          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            FRAMEWORK_SEARCH_PATHS="\$(pwd)/composeApp/build/bin/iosArm64/releaseFramework" \
            IPHONEOS_DEPLOYMENT_TARGET="16.0" 2>&1 | tee xcodebuild.log || {
              echo ""
              echo "=========================================================="
              echo "        XCODEBUILD FAILED! EXACT ERRORS BELOW:"
              echo "=========================================================="
              grep -E -C 3 "error:|fatal error:|Reason:|FAILED|Error:" xcodebuild.log || tail -n 50 xcodebuild.log
              exit 1
            }

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/DerivedData -name "yamibo_app.app" | grep "Release-iphoneos" | head -n 1)
          cp -R "$APP_PATH" Payload/
          zip -qr yamibo-app-unsigned.ipa Payload

      - name: Generate Direct Download Links
        run: |
          echo "=== Uploading IPA for instant direct download ==="
          curl -s -F "file=@yamibo-app-unsigned.ipa" https://tmpfiles.org/api/v1/upload > tmpfiles.json || true
          RAW_URL=$(grep -o '"url":"[^"]*' tmpfiles.json | cut -d'"' -f4)
          DL_URL=$(echo "$RAW_URL" | sed 's|https://tmpfiles.org/|https://tmpfiles.org/dl/|')
          TRANSFER_URL=$(curl --upload-file yamibo-app-unsigned.ipa https://transfer.sh/yamibo-app-unsigned.ipa 2>/dev/null || echo "N/A")
          
          echo ""
          echo "=========================================================="
          echo "           DIRECT INSTANT DOWNLOAD LINKS:"
          echo "=========================================================="
          echo "Tmpfiles Direct Link: $DL_URL"
          echo "Transfer.sh Mirror:   $TRANSFER_URL"
          echo "=========================================================="
          
          echo "### 🚀 iOS Unsigned IPA Direct Download Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Tmpfiles Direct Link:** [Click to Download ($DL_URL)]($DL_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Transfer.sh Mirror:** [Click to Download ($TRANSFER_URL)]($TRANSFER_URL)" >> $GITHUB_STEP_SUMMARY

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yamibo-app-unsigned-ipa
          path: yamibo-app-unsigned.ipa
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: ${{ inputs.publish_release == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="ios-unsigned-latest"
          gh release create "$TAG_NAME" yamibo-app-unsigned.ipa \
            --title "iOS Unsigned IPA (Latest)" \
            --notes "Automated build of unsigned iOS IPA for sideloading (iOS 16.0+). Compatible with TrollStore / Sideloadly / AltStore." \
            --prerelease || \
          gh release upload "$TAG_NAME" yamibo-app-unsigned.ipa --clobber

      - name: Setup tmate session on failure or request
        if: ${{ failure() || inputs.run_tmate == true }}
        uses: mxschmitt/action-tmate@v3
