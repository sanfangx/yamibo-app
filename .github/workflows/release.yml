name: Release Android APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  MIRROR_OWNER: LittleSurvival
  MIRROR_REPO: ymb-apk-release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Validate tag and update manifest
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          manifest_path = Path("update/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          version_code = str(manifest["versionCode"])
          version_name = str(manifest["versionName"])
          channel = str(manifest.get("channel", "stable"))

          if tag != version_code:
              raise SystemExit(f"Release tag must equal manifest versionCode. tag={tag}, versionCode={version_code}")

          changelog = Path("update/changelogs") / f"{version_code}.changelog"
          if not changelog.exists() or not changelog.read_text(encoding="utf-8").strip():
              raise SystemExit(f"Missing or empty {changelog}")

          apk_name = f"yamibo-{channel}-v{version_name}.apk"
          release_title = f"{channel}-v{version_name}"
          release_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/{tag}"
          github_asset_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{tag}/{apk_name}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version_code={version_code}\n")
              out.write(f"version_name={version_name}\n")
              out.write(f"channel={channel}\n")
              out.write(f"apk_name={apk_name}\n")
              out.write(f"release_title={release_title}\n")
              out.write(f"release_url={release_url}\n")
              out.write(f"github_asset_url={github_asset_url}\n")
              out.write(f"changelog={changelog.as_posix()}\n")
          PY

      - name: Sync and validate stable manifest
        run: ./gradlew syncStableManifest validateUpdateManifest --console=plain

      - name: Decode signing keystore
        shell: bash
        env:
          MINE_KEYSTORE_BASE64: ${{ secrets.MINE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${MINE_KEYSTORE_BASE64:-}" ]; then
            echo "MINE_KEYSTORE_BASE64 is required" >&2
            exit 1
          fi
          echo "$MINE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mine.keystore"

      - name: Build release APK
        run: ./gradlew :composeApp:assembleRelease --console=plain

      - name: Sign APK
        id: sign
        shell: bash
        env:
          MINE_KEY_ALIAS: ${{ secrets.MINE_KEY_ALIAS }}
          MINE_KEYSTORE_PASSWORD: ${{ secrets.MINE_KEYSTORE_PASSWORD }}
          MINE_KEY_PASSWORD: ${{ secrets.MINE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          unsigned_apk="$(find composeApp/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$unsigned_apk" ]; then
            echo "No release APK found" >&2
            exit 1
          fi

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          aligned_apk="$RUNNER_TEMP/aligned.apk"
          signed_apk="$RUNNER_TEMP/${{ steps.meta.outputs.apk_name }}"

          "$build_tools/zipalign" -f -p 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$RUNNER_TEMP/mine.keystore" \
            --ks-key-alias "$MINE_KEY_ALIAS" \
            --ks-pass "pass:$MINE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$MINE_KEY_PASSWORD" \
            --out "$signed_apk" \
            "$aligned_apk"
          "$build_tools/apksigner" verify "$signed_apk"

          sha256="$(sha256sum "$signed_apk" | awk '{print $1}')"
          size="$(stat -c%s "$signed_apk")"
          echo "apk_path=$signed_apk" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          title="${{ steps.meta.outputs.release_title }}"
          changelog="${{ steps.meta.outputs.changelog }}"
          apk="${{ steps.sign.outputs.apk_path }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$changelog"
            gh release upload "$tag" "$apk" --clobber
          else
            gh release create "$tag" "$apk" --title "$title" --notes-file "$changelog" --verify-tag
          fi

      - name: Start SSH agent for mirrors
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
            ${{ secrets.GITCODE_SSH_PRIVATE_KEY }}

      - name: Trust mirror SSH hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          ssh-keyscan gitcode.com >> ~/.ssh/known_hosts

      - name: Prepare mirror release tags
        shell: bash
        run: |
          set -euo pipefail

          prepare_mirror_tag() {
            local name="$1"
            local remote="$2"
            local dir="$RUNNER_TEMP/mirror-tag-$name"

            rm -rf "$dir"
            mkdir -p "$dir/update"
            cp update/manifest.json "$dir/update/manifest.json"
            cp update/stable.json "$dir/update/stable.json"

            git -C "$dir" init
            git -C "$dir" config user.name "github-actions[bot]"
            git -C "$dir" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$dir" remote add origin "$remote"
            git -C "$dir" add update
            git -C "$dir" commit -m "Prepare mirror release tag ${{ steps.meta.outputs.release_title }}"
            git -C "$dir" branch -M main
            git -C "$dir" push --force origin main
            git -C "$dir" tag -f "${{ github.ref_name }}"
            git -C "$dir" push --force origin "${{ github.ref_name }}"
          }

          prepare_mirror_tag "gitee" "git@gitee.com:${MIRROR_OWNER}/${MIRROR_REPO}.git"
          prepare_mirror_tag "gitcode" "git@gitcode.com:${MIRROR_OWNER}/${MIRROR_REPO}.git"

      - name: Publish Gitee release asset
        id: gitee_release
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
          TITLE: ${{ steps.meta.outputs.release_title }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
          APK: ${{ steps.sign.outputs.apk_path }}
          APK_NAME: ${{ steps.meta.outputs.apk_name }}
        run: |
          set -euo pipefail
          bash .github/scripts/publish-gitee-release-asset.sh

      - name: Publish GitCode release asset
        id: gitcode_release
        shell: bash
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          TAG: ${{ github.ref_name }}
          TITLE: ${{ steps.meta.outputs.release_title }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
          APK: ${{ steps.sign.outputs.apk_path }}
          APK_NAME: ${{ steps.meta.outputs.apk_name }}
        run: |
          set -euo pipefail
          bash .github/scripts/publish-gitcode-release-asset.sh

      - name: Generate published update manifests
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_DIR="$RUNNER_TEMP/published-update/github/update" \
          RELEASE_URL="${{ steps.meta.outputs.release_url }}" \
          ASSET_URL="${{ steps.meta.outputs.github_asset_url }}" \
          APK_SHA256="${{ steps.sign.outputs.sha256 }}" \
          APK_SIZE="${{ steps.sign.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

          OUTPUT_DIR="$RUNNER_TEMP/published-update/gitee/update" \
          RELEASE_URL="${{ steps.gitee_release.outputs.release_url }}" \
          ASSET_URL="${{ steps.gitee_release.outputs.asset_url }}" \
          APK_SHA256="${{ steps.sign.outputs.sha256 }}" \
          APK_SIZE="${{ steps.sign.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

          OUTPUT_DIR="$RUNNER_TEMP/published-update/gitcode/update" \
          RELEASE_URL="${{ steps.gitcode_release.outputs.release_url }}" \
          ASSET_URL="${{ steps.gitcode_release.outputs.asset_url }}" \
          APK_SHA256="${{ steps.sign.outputs.sha256 }}" \
          APK_SIZE="${{ steps.sign.outputs.size }}" \
            python3 .github/scripts/write-published-update-manifest.py

      - name: Validate published update manifests
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/github/update" --console=plain
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/gitee/update" --console=plain
          ./gradlew validatePublishedUpdateManifest -PpublishedUpdateDir="$RUNNER_TEMP/published-update/gitcode/update" --console=plain

      - name: Push published update folder to GitHub update-release branch
        shell: bash
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/github-update-release"
          rm -rf "$dir"
          mkdir -p "$dir"
          cp -R "$RUNNER_TEMP/published-update/github/update" "$dir/update"

          git -C "$dir" init
          git -C "$dir" config user.name "github-actions[bot]"
          git -C "$dir" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$dir" remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git -C "$dir" add update
          git -C "$dir" commit -m "Publish update manifest for ${{ steps.meta.outputs.release_title }}"
          git -C "$dir" branch -M update-release
          git -C "$dir" push --force origin update-release

      - name: Push update folder to mirror repositories
        shell: bash
        run: |
          set -euo pipefail

          push_mirror() {
            local name="$1"
            local remote="$2"
            local dir="$RUNNER_TEMP/mirror-$name"

            rm -rf "$dir"
            mkdir -p "$dir"
            cp -R "$RUNNER_TEMP/published-update/$name/update" "$dir/update"

            git -C "$dir" init
            git -C "$dir" config user.name "github-actions[bot]"
            git -C "$dir" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$dir" remote add origin "$remote"
            git -C "$dir" add update
            git -C "$dir" commit -m "Update release manifest"
            git -C "$dir" branch -M main
            git -C "$dir" push --force origin main
            git -C "$dir" tag -f "${{ github.ref_name }}"
            git -C "$dir" push --force origin "${{ github.ref_name }}"
          }

          push_mirror "gitee" "git@gitee.com:${MIRROR_OWNER}/${MIRROR_REPO}.git"
          push_mirror "gitcode" "git@gitcode.com:${MIRROR_OWNER}/${MIRROR_REPO}.git"
