name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Kotlin framework for iOS
        run: |
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64 \
            --console=plain

      - name: Create shared xcscheme for CI
        shell: bash
        run: |
          mkdir -p iosApp/iosApp.xcodeproj/xcshareddata/xcschemes
          cat > iosApp/iosApp.xcodeproj/xcshareddata/xcschemes/iosApp.xcscheme << 'XCS'
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme
             LastUpgradeVersion = "1620"
             version = "1.3">
             <BuildAction
                parallelizeBuildables = "YES"
                buildImplicitDependencies = "YES">
                <BuildActionEntries>
                   <BuildActionEntry
                      buildForTesting = "YES"
                      buildForRunning = "YES"
                      buildForProfiling = "YES"
                      buildForArchiving = "YES"
                      buildForAnalyzing = "YES">
                      <BuildableReference
                         BuildableIdentifier = "primary"
                         BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                         BuildableName = "yamibo_app.app"
                         BlueprintName = "iosApp"
                         ReferencedContainer = "container:iosApp.xcodeproj">
                      </BuildableReference>
                   </BuildActionEntry>
                </BuildActionEntries>
             </BuildAction>
             <TestAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                shouldUseLaunchSchemeArgsEnv = "YES">
                <Testables>
                </Testables>
             </TestAction>
             <LaunchAction
                buildConfiguration = "Debug"
                selectedDebuggerIdentifier = "Xcode.DebuggerFoundation.Debugger.LLDB"
                selectedLauncherIdentifier = "Xcode.DebuggerFoundation.Launcher.LLDB"
                launchStyle = "0"
                useCustomWorkingDirectory = "NO"
                ignoresPersistentStateOnLaunch = "NO"
                debugDocumentVersioning = "YES"
                debugServiceExtension = "internal"
                allowLocationSimulation = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                      BuildableName = "yamibo_app.app"
                      BlueprintName = "iosApp"
                      ReferencedContainer = "container:iosApp.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </LaunchAction>
             <ProfileAction
                buildConfiguration = "Release"
                shouldUseLaunchSchemeArgsEnv = "YES"
                savedToolIdentifier = ""
                useCustomWorkingDirectory = "NO"
                debugDocumentVersioning = "YES">
                <BuildableProductRunnable
                   runnableDebuggingMode = "0">
                   <BuildableReference
                      BuildableIdentifier = "primary"
                      BlueprintIdentifier = "FF31D3AF523983E277DF61E8"
                      BuildableName = "yamibo_app.app"
                      BlueprintName = "iosApp"
                      ReferencedContainer = "container:iosApp.xcodeproj">
                   </BuildableReference>
                </BuildableProductRunnable>
             </ProfileAction>
             <AnalyzeAction
                buildConfiguration = "Debug">
             </AnalyzeAction>
             <ArchiveAction
                buildConfiguration = "Release"
                revealArchiveInOrganizer = "YES">
             </ArchiveAction>
          </Scheme>
          XCS

      - name: Archive iOS app
        shell: bash
        run: |
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Export IPA
        shell: bash
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios.xcarchive \
            -exportPath build/ios \
            -exportOptionsPlist iosApp/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yamibo-ios-unsigned
          path: build/ios/*.ipa
          if-no-files-found: error

      - name: Upload IPA to GitHub Release (tag only)
        if: startsWith(github.ref, "refs/tags/")
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ipa_file="$(find build/ios -name '*.ipa' -maxdepth 1 | head -n 1)"
          if [ -z "$ipa_file" ]; then
            echo "No IPA found" >&2
            exit 1
          fi
          version_name="$(python3 -c 'import json,sys;print(json.load(sys.stdin)["versionName"])' < update/manifest.json)"
          ipa_name="yamibo-ios-v${version_name}.ipa"
          cp "$ipa_file" "$ipa_name"
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$ipa_name" --clobber
          else
            gh release create "$tag" "$ipa_name" --title "ios-${tag}" --notes "iOS unsigned IPA build."
          fi